version: "3.8"

services:
  app:
    build: .

    container_name: newsglance-api

    ports:
      - "5000:5000"

    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      GUARDIAN_API_KEY: ${GUARDIAN_API_KEY}
      GUARDIAN_API_URL: ${GUARDIAN_API_URL}
      BREVO_USER: ${BREVO_USER}
      BREVO_PASS: ${BREVO_PASS}
      BREVO_FROM: ${BREVO_FROM}
      IP_INFO_TOKEN: ${IP_INFO_TOKEN}
      AWS_REGION: ${AWS_REGION}
      AWS_POLLY_REGION: ${AWS_POLLY_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      BEDROCK_ACCESS_KEY: ${BEDROCK_ACCESS_KEY}
      BEDROCK_SECRET_KEY: ${BEDROCK_SECRET_KEY}
      POLLY_ACCESS_KEY: ${POLLY_ACCESS_KEY}
      POLLY_SECRET_KEY: ${POLLY_SECRET_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      CASHFREE_APP_ID: ${CASHFREE_APP_ID}
      CASHFREE_SECRET_KEY: ${CASHFREE_SECRET_KEY}
      FUEL_PRICE_API: ${FUEL_PRICE_API}
      FUEL_PRICE_URL: ${FUEL_PRICE_URL}

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "--eval",
          "fetch('http://localhost:5000/api/health').then(r=>{if(r.status!==200)process.exit(1)}).catch(()=>process.exit(1))",
        ]

      interval: 30s

      timeout: 5s

      retries: 3

      start_period: 20s
